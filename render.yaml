services:
  - type: web
    name: outerattic-bot
    runtime: node
    buildCommand: npm install
    startCommand: node bot.js
    plan: free
    envVars:
      - key: DISCORD_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false  # Set manually in Render dashboard (paste full JSON)
      - key: NODE_ENV
        value: production
